#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.hermes
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d
#
services:
  arcadedb:
    image: arcadedb/arcadedb:26.7.1
    container_name: hermes-arcadedb
    restart: unless-stopped
    ports:
      - "5432:5432"
      - "2480:2480"
    volumes:
      - arcadedb_data:/storage
    environment:
      - ARCADEDB_ROOT_PASSWORD=${ARCADEDB_PASSWORD:-hermes123}
      - JAVA_OPTS=-Xmx4g -Xms256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2480/api/v1/server"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    depends_on:
      - arcadedb
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
    command: ["gateway", "run"]

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - HERMES_DASHBOARD_HOST=0.0.0.0
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]

volumes:
  arcadedb_data:
